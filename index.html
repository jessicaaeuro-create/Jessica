<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>MIFATURE</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>
body{
 font-family:Arial;
 background:#02140f;
 color:white;
 display:flex;
 justify-content:center;
 align-items:center;
 height:100vh;
}
.card{
 background:#0a2e22;
 padding:30px;
 border-radius:10px;
 width:300px;
}
input,button{
 width:100%;
 padding:10px;
 margin:10px 0;
}
</style>
</head>

<body>

<div id="login" class="card">
<h2>🌿 MIFATURE</h2>
<input id="email" placeholder="Email">
<input id="senha" type="password" placeholder="Senha">
<button onclick="login()">Entrar</button>
<button onclick="cadastrar()">Criar conta</button>
</div>

<div id="app" class="card" style="display:none;">
<h2>👑 Sistema</h2>
<p>Logado com sucesso</p>
<button onclick="logout()">Sair</button>
</div>

<script>
const supabase = supabase.createClient(
  "https://majvmfbdqwjlcizsohwc.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1hanZtZmJkcXdqbGNpenNvaHdjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njc4MTUzOTksImV4cCI6MjA4MzM5MTM5OX0.T3hUmHOrjHJ27hkqxpxp3Ow5Wz1Tame7gGwJkKDq66g"
);

// LOGIN
async function login(){
 const email = document.getElementById('email').value;
 const senha = document.getElementById('senha').value;

 const { error } = await supabase.auth.signInWithPassword({
   email,
   password: senha
 });

 if(error){
   alert(error.message);
 }else{
   alert("Entrou!");
   mostrarApp();
 }
}

// CADASTRO
async function cadastrar(){
 const email = document.getElementById('email').value;
 const senha = document.getElementById('senha').value;

 const { error } = await supabase.auth.signUp({
   email,
   password: senha
 });

 if(error){
   alert(error.message);
 }else{
   alert("Conta criada!");
 }
}

// LOGOUT
async function logout(){
 await supabase.auth.signOut();
 location.reload();
}

// MOSTRAR APP
function mostrarApp(){
 document.getElementById('login').style.display = 'none';
 document.getElementById('app').style.display = 'block';
}
</script>

</body>
</html>
